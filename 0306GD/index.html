<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鹅鸭杀 · 角色攻略</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500;700&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --goose: #F5C842;
    --goose-dim: #7a6218;
    --goose-bg: rgba(245,200,66,0.08);
    --duck: #E8453C;
    --duck-dim: #7a1f1a;
    --duck-bg: rgba(232,69,60,0.08);
    --neutral: #A855F7;
    --neutral-dim: #5b2d80;
    --neutral-bg: rgba(168,85,247,0.08);
    --bg: #0f0f14;
    --surface: #17171f;
    --surface2: #1e1e28;
    --border: rgba(255,255,255,0.06);
    --text: #e8e8f0;
    --text-dim: #7a7a99;
    --glow: 0 0 30px rgba(245,200,66,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(245,200,66,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(232,69,60,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(168,85,247,0.02) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 60px 20px 40px;
    border-bottom: 1px solid var(--border);
  }

  .logo-wrap {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }

  .logo-icon {
    font-size: 48px;
    animation: waddle 3s ease-in-out infinite;
    display: inline-block;
    filter: drop-shadow(0 0 12px rgba(245,200,66,0.5));
  }

  @keyframes waddle {
    0%,100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }

  h1 {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    background: linear-gradient(135deg, #F5C842 0%, #ff9a3c 50%, #E8453C 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 4px;
    text-shadow: none;
    filter: drop-shadow(0 2px 20px rgba(245,200,66,0.3));
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    letter-spacing: 3px;
    margin-top: 8px;
    font-weight: 300;
  }

  /* ── FILTER TABS ── */
  .filter-bar {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 30px 20px 20px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 22px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: 'Noto Sans SC', sans-serif;
    letter-spacing: 1px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .filter-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.25s;
    border-radius: 50px;
  }

  .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

  .filter-btn.active[data-faction="all"] { background: linear-gradient(135deg,#F5C842,#E8453C); color: #0f0f14; border-color: transparent; font-weight: 700; }
  .filter-btn.active[data-faction="goose"] { background: var(--goose); color: #0f0f14; border-color: transparent; font-weight: 700; }
  .filter-btn.active[data-faction="duck"] { background: var(--duck); color: #fff; border-color: transparent; font-weight: 700; }
  .filter-btn.active[data-faction="neutral"] { background: var(--neutral); color: #fff; border-color: transparent; font-weight: 700; }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    padding: 0 20px 30px;
  }

  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px 10px 44px;
    border-radius: 50px;
    width: 100%;
    max-width: 360px;
    font-size: 0.9rem;
    font-family: 'Noto Sans SC', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input:focus {
    border-color: rgba(245,200,66,0.4);
    box-shadow: 0 0 0 3px rgba(245,200,66,0.08);
  }

  .search-icon {
    position: absolute;
    left: calc(50% - 180px + 14px);
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 16px;
    pointer-events: none;
  }

  /* ── GRID ── */
  .grid-section {
    position: relative;
    z-index: 5;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
    padding-left: 4px;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 40px;
  }

  /* ── CHARACTER CARD ── */
  .char-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 16px 18px;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .char-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
  }

  .char-card.goose::before { background: linear-gradient(90deg, var(--goose), transparent); }
  .char-card.duck::before  { background: linear-gradient(90deg, var(--duck), transparent); }
  .char-card.neutral::before { background: linear-gradient(90deg, var(--neutral), transparent); }

  .char-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255,255,255,0.14);
  }

  .char-card.goose:hover  { box-shadow: 0 8px 30px rgba(245,200,66,0.15); border-color: rgba(245,200,66,0.3); }
  .char-card.duck:hover   { box-shadow: 0 8px 30px rgba(232,69,60,0.15); border-color: rgba(232,69,60,0.3); }
  .char-card.neutral:hover{ box-shadow: 0 8px 30px rgba(168,85,247,0.15); border-color: rgba(168,85,247,0.3); }

  .card-emoji {
    font-size: 36px;
    display: block;
    margin-bottom: 12px;
    line-height: 1;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  }

  .card-name {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 1.05rem;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .card-tag {
    display: inline-block;
    font-size: 0.68rem;
    padding: 2px 10px;
    border-radius: 50px;
    font-weight: 500;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .goose .card-tag { background: var(--goose-bg); color: var(--goose); border: 1px solid rgba(245,200,66,0.25); }
  .duck  .card-tag { background: var(--duck-bg);  color: var(--duck);  border: 1px solid rgba(232,69,60,0.25); }
  .neutral .card-tag { background: var(--neutral-bg); color: var(--neutral); border: 1px solid rgba(168,85,247,0.25); }

  .card-role {
    font-size: 0.76rem;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* hidden */
  .char-card.hidden { display: none; }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,8,12,0.88);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px;
    overflow-y: auto;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 720px;
    margin: auto;
    position: relative;
    transform: scale(0.95) translateY(20px);
    transition: transform 0.3s;
    overflow: hidden;
  }

  .modal-overlay.open .modal {
    transform: scale(1) translateY(0);
  }

  .modal-header {
    padding: 32px 32px 24px;
    position: relative;
  }

  .modal-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 32px; right: 32px;
    height: 1px;
    background: var(--border);
  }

  .modal-faction-bar {
    height: 4px;
    position: absolute;
    top: 0; left: 0; right: 0;
    border-radius: 20px 20px 0 0;
  }

  .modal.goose .modal-faction-bar  { background: linear-gradient(90deg, var(--goose), transparent 70%); }
  .modal.duck  .modal-faction-bar  { background: linear-gradient(90deg, var(--duck), transparent 70%); }
  .modal.neutral .modal-faction-bar{ background: linear-gradient(90deg, var(--neutral), transparent 70%); }

  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 34px; height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s;
  }

  .modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  .modal-title-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .modal-emoji { font-size: 52px; line-height: 1; }

  .modal-name {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 1.8rem;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .modal-tags { display: flex; gap: 8px; flex-wrap: wrap; }

  .modal-tag {
    font-size: 0.72rem;
    padding: 3px 12px;
    border-radius: 50px;
    letter-spacing: 1px;
    font-weight: 500;
  }

  .modal.goose  .modal-tag.faction { background: var(--goose-bg); color: var(--goose); border: 1px solid rgba(245,200,66,0.3); }
  .modal.duck   .modal-tag.faction { background: var(--duck-bg);  color: var(--duck);  border: 1px solid rgba(232,69,60,0.3); }
  .modal.neutral.modal-tag.faction,
  .modal.neutral .modal-tag.faction{ background: var(--neutral-bg); color: var(--neutral); border: 1px solid rgba(168,85,247,0.3); }

  .modal-tag.win { background: rgba(52,211,153,0.1); color: #34d399; border: 1px solid rgba(52,211,153,0.25); }

  .modal-body {
    padding: 28px 32px 36px;
    display: grid;
    gap: 20px;
  }

  .section {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }

  .section-title {
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .modal.goose  .dot { background: var(--goose); }
  .modal.duck   .dot { background: var(--duck); }
  .modal.neutral .dot { background: var(--neutral); }

  .skill-block {
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border-left: 3px solid transparent;
    font-size: 0.88rem;
    line-height: 1.7;
  }

  .modal.goose  .skill-block { border-left-color: var(--goose); }
  .modal.duck   .skill-block { border-left-color: var(--duck); }
  .modal.neutral .skill-block { border-left-color: var(--neutral); }

  .skill-label {
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-weight: 500;
  }

  .tip-list {
    list-style: none;
    display: grid;
    gap: 8px;
  }

  .tip-list li {
    display: flex;
    gap: 10px;
    font-size: 0.88rem;
    line-height: 1.6;
  }

  .tip-list li::before {
    content: '›';
    font-size: 1.1rem;
    flex-shrink: 0;
    margin-top: -1px;
  }

  .modal.goose  .tip-list li::before { color: var(--goose); }
  .modal.duck   .tip-list li::before { color: var(--duck); }
  .modal.neutral .tip-list li::before { color: var(--neutral); }

  .avoid-list li::before { content: '✕'; font-size: 0.8rem; color: var(--duck) !important; }

  .quote-box {
    background: rgba(0,0,0,0.25);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.85rem;
    line-height: 1.7;
    color: var(--text-dim);
    font-style: italic;
    border: 1px dashed rgba(255,255,255,0.08);
  }

  .quote-box::before { content: '"'; font-size: 1.4rem; vertical-align: -0.2em; opacity: 0.4; margin-right: 4px; }
  .quote-box::after  { content: '"'; font-size: 1.4rem; vertical-align: -0.2em; opacity: 0.4; margin-left: 2px; }

  .relation-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .relation-item {
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.82rem;
    line-height: 1.5;
  }

  .rel-title { font-size: 0.68rem; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 4px; }

  /* ── STATS BAR ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .stat-box {
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
  }

  .stat-val {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    line-height: 1;
    margin-bottom: 4px;
  }

  .modal.goose  .stat-val { color: var(--goose); }
  .modal.duck   .stat-val { color: var(--duck); }
  .modal.neutral .stat-val { color: var(--neutral); }

  .stat-name { font-size: 0.68rem; color: var(--text-dim); letter-spacing: 1px; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    display: none;
  }

  .empty-state.show { display: block; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .modal-body { padding: 20px 18px 28px; }
    .modal-header { padding: 28px 18px 20px; }
    .modal-name { font-size: 1.4rem; }
    .relation-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .search-icon { left: calc(50% - 50vw + 34px); }
  }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <span class="logo-icon">🪿</span>
    <h1>鹅鸭杀</h1>
    <span class="logo-icon" style="animation-delay:0.5s; font-size:36px">🦆</span>
  </div>
  <p class="subtitle">角色攻略 · Goose Goose Duck Guide</p>
</header>

<div class="filter-bar">
  <button class="filter-btn active" data-faction="all">全部角色</button>
  <button class="filter-btn" data-faction="goose">🪿 鹅阵营</button>
  <button class="filter-btn" data-faction="duck">🦆 鸭阵营</button>
  <button class="filter-btn" data-faction="neutral">🐦 中立阵营</button>
</div>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input type="text" class="search-input" placeholder="搜索角色名称…" id="searchInput">
</div>

<div class="grid-section" id="gridSection">
  <div class="empty-state" id="emptyState">没有找到匹配的角色 🪿</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-faction-bar"></div>
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

// Render
const section = document.getElementById('gridSection');
const emptyState = document.getElementById('emptyState');

function getFactionColor(f) {
  return f === 'goose' ? 'var(--goose)' : f === 'duck' ? 'var(--duck)' : 'var(--neutral)';
}

function renderCards(chars) {
  // Remove old grids
  document.querySelectorAll('.faction-block').forEach(el => el.remove());
  emptyState.classList.remove('show');

  if (chars.length === 0) { emptyState.classList.add('show'); return; }

  const factions = ['goose','duck','neutral'];
  const labels = { goose:'🪿 鹅阵营', duck:'🦆 鸭阵营', neutral:'🐦 中立阵营' };

  factions.forEach(f => {
    const group = chars.filter(c => c.faction === f);
    if (group.length === 0) return;
    const block = document.createElement('div');
    block.className = 'faction-block';
    block.innerHTML = `<div class="section-label">${labels[f]}</div><div class="cards-grid"></div>`;
    const grid = block.querySelector('.cards-grid');
    group.forEach((c, i) => {
      const card = document.createElement('div');
      card.className = `char-card ${c.faction}`;
      card.style.animationDelay = `${i * 0.04}s`;
      card.innerHTML = `
        <span class="card-emoji">${c.emoji}</span>
        <div class="card-name">${c.name}</div>
        <span class="card-tag">${c.factionLabel}</span>
        <div class="card-role">${c.role}</div>
      `;
      card.onclick = () => openModal(c);
      grid.appendChild(card);
    });
    section.insertBefore(block, emptyState);
  });
}

// Filter & Search
let currentFaction = 'all';
let searchQuery = '';

function applyFilters() {
  const filtered = CHARS.filter(c => {
    const matchFaction = currentFaction === 'all' || c.faction === currentFaction;
    const matchSearch = c.name.includes(searchQuery) || c.role.includes(searchQuery);
    return matchFaction && matchSearch;
  });
  renderCards(filtered);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFaction = btn.dataset.faction;
    applyFilters();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  applyFilters();
});

// Modal
function openModal(c) {
  const overlay = document.getElementById('modalOverlay');
  const modal = document.getElementById('modal');
  const header = document.getElementById('modalHeader');
  const body = document.getElementById('modalBody');

  modal.className = `modal ${c.faction}`;

  const accentColor = getFactionColor(c.faction);

  header.innerHTML = `
    <div class="modal-faction-bar"></div>
    <div class="modal-title-row">
      <span class="modal-emoji">${c.emoji}</span>
      <div>
        <div class="modal-name">${c.name}</div>
        <div class="modal-tags">
          <span class="modal-tag faction">${c.factionLabel}</span>
          <span class="modal-tag win">🏆 ${c.win}</span>
        </div>
      </div>
    </div>
  `;

  const statEntries = Object.entries(c.stats);
  const statsHTML = statEntries.map(([k,v]) => `
    <div class="stat-box">
      <div class="stat-val">${v}</div>
      <div class="stat-name">${k}</div>
    </div>
  `).join('');

  const coreHTML = c.core.map(t => `<li>${t}</li>`).join('');
  const advHTML = c.advanced.map(t => `<li>${t}</li>`).join('');
  const avoidHTML = c.avoid.map(t => `<li>${t}</li>`).join('');

  body.innerHTML = `
    <div class="section">
      <div class="section-title"><span class="dot"></span>技能详情</div>
      <div class="skill-block">
        <div class="skill-label">技能效果</div>
        ${c.skill}
      </div>
      <div class="skill-block">
        <div class="skill-label">冷却时间</div>
        ${c.cooldown}
      </div>
      <div class="skill-block">
        <div class="skill-label">手机操作</div>
        ${c.mobile}
      </div>
    </div>

    <div class="section">
      <div class="section-title"><span class="dot"></span>核心玩法</div>
      <div class="stats-row">${statsHTML}</div>
      <ul class="tip-list">${coreHTML}</ul>
    </div>

    <div class="section">
      <div class="section-title"><span class="dot"></span>进阶技巧</div>
      <ul class="tip-list">${advHTML}</ul>
    </div>

    <div class="section">
      <div class="section-title"><span class="dot"></span>注意事项</div>
      <ul class="tip-list avoid-list">${avoidHTML}</ul>
    </div>

    <div class="section">
      <div class="section-title"><span class="dot"></span>配合与克制</div>
      <div class="relation-grid">
        <div class="relation-item">
          <div class="rel-title">🤝 配合角色</div>
          ${c.synergy}
        </div>
        <div class="relation-item">
          <div class="rel-title">⚔️ 克制关系</div>
          ${c.counter}
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title"><span class="dot"></span>参考发言模板</div>
      <div class="quote-box">${c.speech}</div>
    </div>
  `;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Init
renderCards(CHARS);
